<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1F4D"/>
      <stop offset="100%" style="stop-color:#1a3a6e"/>
    </linearGradient>
    <linearGradient id="saffron" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9933"/>
      <stop offset="100%" style="stop-color:#e8821a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Tricolor strip top -->
  <rect x="0" y="0" width="1200" height="8" fill="#FF9933"/>
  <rect x="0" y="8" width="1200" height="8" fill="#ffffff"/>
  <rect x="0" y="16" width="1200" height="8" fill="#138808"/>
  <!-- Subtle grid lines -->
  <line x1="0" y1="630" x2="1200" y2="0" stroke="rgba(255,255,255,0.03)" stroke-width="200"/>
  <!-- Logo mark -->
  <g transform="translate(80, 220)">
    <rect x="0" y="0" width="60" height="20" rx="4" fill="#FF9933"/>
    <rect x="0" y="26" width="40" height="14" rx="4" fill="rgba(255,255,255,0.3)"/>
    <rect x="0" y="46" width="50" height="14" rx="4" fill="#138808"/>
  </g>
  <!-- Brand name -->
  <text x="80" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="rgba(255,153,51,0.9)" letter-spacing="3">AARAMBHA HAQ</text>
  <!-- Main headline -->
  <text x="80" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" fill="#ffffff">अपना हक़ जानिए</text>
  <!-- Subline -->
  <text x="80" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="rgba(255,255,255,0.7)">2,754+ सरकारी योजनाएं · 22 भाषाएं · निःशुल्क</text>
  <!-- Badge -->
  <rect x="80" y="430" width="280" height="48" rx="24" fill="url(#saffron)"/>
  <text x="220" y="461" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#fff" text-anchor="middle">पात्रता जांचें →</text>
  <!-- URL -->
  <text x="1120" y="590" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="rgba(255,255,255,0.4)" text-anchor="end">haq.aarambhax.in</text>
  <!-- Decorative circles -->
  <circle cx="1050" cy="200" r="180" fill="rgba(255,153,51,0.05)" stroke="rgba(255,153,51,0.1)" stroke-width="2"/>
  <circle cx="1100" cy="350" r="120" fill="rgba(19,136,8,0.05)" stroke="rgba(19,136,8,0.1)" stroke-width="2"/>
</svg>
